<!DOCTYPE html>
<html>
<head>
    <title>Promos</title>
</head>
<body>

    <h1>All Promos</h1>

    {% for promo in promos %}

        <div style="border:1px solid black; padding:10px; margin:10px;">

            <h3>{{ promo[1] }}</h3>

            <p>Category: {{ promo[2] }}</p>

            <p>Price: ₱{{ promo[3] }}</p>

            <p>Status: {{ promo[6] }}</p>
            <img src="/{{ promo[7] }}"
            width="200">

        </div>

    {% endfor %}

    <a href="/">
        Home
    </a>
    print(promo)

</body>
</html>
