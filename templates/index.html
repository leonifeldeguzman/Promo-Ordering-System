<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeakNSave — Voice Assistant</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script>
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;

      function updateStatus(text, isActive) {
        const bar = document.getElementById("statusBar");
        const barText = document.getElementById("statusText");
        const searchBar = document.getElementById("searchBarWrapper");
        const micBtn = document.getElementById("micBtn");

        barText.textContent = text;

        if (isActive) {
          bar.classList.remove("hidden");
          searchBar.classList.add("hidden");
          micBtn.classList.add("listening");
        } else {
          bar.classList.add("hidden");
          searchBar.classList.remove("hidden");
          micBtn.classList.remove("listening");
        }
      }

      function setSearchText(text) {
        document.getElementById("searchInput").value = text;
        if (text) {
          document.getElementById("searchBar").classList.add("active");
        } else {
          document.getElementById("searchBar").classList.remove("active");
        }
      }

      async function fetchAndRender(url) {
        try {
          const response = await fetch(url);
          const data = await response.json();

          const resultsDiv = document.getElementById("results");
          resultsDiv.innerHTML = "";

          let reply = "";

          if (!data || data.length === 0) {
            resultsDiv.innerHTML = `
                <div class="results-header">
                    <h2>OTHER OPTIONS</h2>
                    <div class="matches-badge">Matches : 0</div>
                </div>

                <p class="empty-text">
                    We couldn't find an exact match.
                </p>
            `;

            reply = "Sorry, no promos found.";
          } else {
            reply = `I found ${data.length} promos for you.`;

            let cardsHTML = "";

            data.forEach((promo, index) => {
              cardsHTML += `
                    <div class="carousel-card ${index === 0 ? "active" : ""}">
                        
                        <div class="promo-image">
                          ${
                            promo.image_url
                              ? `<img src="/static/${promo.image_url}" alt="${promo.name}">`
                              : ""
                          }
                            
                            <span class="promo-tag">
                                ${promo.tag || "Promo"}
                            </span>
                        </div>

                        <div class="card-content">
                            <h3>${promo.name}</h3>

                            <p>
                                ${promo.description}
                            </p>

                            <div class="price-row">
                                <span class="old-price">
                                    ₱${promo.old_price || promo.price + 40}
                                </span>

                                <span class="new-price">
                                    ₱${promo.price}
                                </span>
                            </div>
                        </div>

                    </div>
                `;
            });

            resultsDiv.innerHTML = `
                <div class="results-wrapper">

                    <div class="results-header">
                        <h2>DEALS OFFERED</h2>

                        <div class="matches-badge">
                            Matches : ${data.length}
                        </div>
                    </div>

                    <div class="carousel-container">

                        <button class="carousel-btn left">
                            &#10094;
                        </button>

                        <div class="carousel-track">
                            ${cardsHTML}
                        </div>

                        <button class="carousel-btn right">
                            &#10095;
                        </button>

                    </div>

                    <div class="results-footer">

                        <button class="retry-btn">
                            Try Again
                        </button>

                        <button class="view-btn">
                            View All Promos
                        </button>

                    </div>

                </div>
            `;
            initializeCarousel();
          }

          const speech = new SpeechSynthesisUtterance(reply);
          speech.lang = "en-US";

          window.speechSynthesis.speak(speech);
        } catch (err) {
          console.error(err);
        }
      }
      function initializeCarousel() {
        const track = document.querySelector(".carousel-track");

        const leftBtn = document.querySelector(".carousel-btn.left");

        const rightBtn = document.querySelector(".carousel-btn.right");

        if (!track || !leftBtn || !rightBtn) return;

        const scrollAmount = 320;

        rightBtn.addEventListener("click", () => {
          track.scrollBy({
            left: scrollAmount,
            behavior: "smooth",
          });
        });

        leftBtn.addEventListener("click", () => {
          track.scrollBy({
            left: -scrollAmount,
            behavior: "smooth",
          });
        });
      }

      function processQuery(transcript) {
    const text = transcript.toLowerCase().trim();
    console.log("Processing:", text);

    // Extract pax / people count
let pax = null;

const paxPatterns = [
    /(\d+)\s*(pax|people|persons|person)/i,
    /feed\s*(\d+)/i,
    /for\s*(\d+)/i,
    /good for\s*(\d+)/i
];

for (const pattern of paxPatterns) {
    const match = text.match(pattern);
    if (match) {
        pax = parseInt(match[1]);
        break;
    }
}

console.log("Pax:", pax);
    
    // Extract budget
    const budgetMatch = text.match(/\d+/);
    const budget = budgetMatch ? parseInt(budgetMatch[0]) : null;
    
    // Determine budget type
    let budgetType = null;
    if (text.includes("under") || text.includes("below") || text.includes("less than")) {
        budgetType = "under";
    } else if (text.includes("above") || text.includes("over") || text.includes("more than")) {
        budgetType = "above";
    }
    
    // Check for "all promos" intent
    const isAllPromos = 
        text === "all" ||
        text === "all promos" ||
        text === "show all" ||
        text === "everything" ||
        text === "all items" ||
        text === "menu";
    
    console.log("Is all promos:", isAllPromos);
    
    // 1. ALL PROMOS
    if (isAllPromos) {
        if (budget && budgetType) {
            const url = `/promos/search?q=all&budget=${budget}&type=${budgetType}`;
            console.log("URL (all promos with budget):", url);
            return url;
        }
        let url = `/promos/search?q=all`;

        if (pax) {
            url += `&pax=${pax}`;
        }

        console.log("URL (all promos):", url);
        return url;
    }
    
    // List of generic terms that should trigger "all promos" with budget
    const genericTerms = ["meals", "food", "items", "promos", "deals", "offers"];
    const isGenericQuery = genericTerms.some(term => text.includes(term));
    
    // 2. If it's a generic term like "meals under 150", treat as budget-only query
      if (isGenericQuery && budget && budgetType) {

        let url = `/promos/search?q=all&budget=${budget}&type=${budgetType}`;

        if (pax) {
            url += `&pax=${pax}`;
        }

        console.log("URL (generic term with budget):", url);
        return url;
    }
    
    // 3. Extract specific food/item name by removing budget and generic words
    let possibleFoodItem = text;
    
    // Remove the budget number
    if (budget) {
        possibleFoodItem = possibleFoodItem.replace(budget.toString(), "");
    }
    
    // Remove budget indicator words
    possibleFoodItem = possibleFoodItem.replace(/under|below|less than|above|over|more than|pesos|p|php/gi, "");
    
    // Remove generic terms
    possibleFoodItem = possibleFoodItem.replace(/meals|food|items|promos|deals|offers/gi, "");
    
    // Remove filler words
    possibleFoodItem = possibleFoodItem.replace(/i want|i need|can i have|please|get me|show me|suggest|promo/gi, "");
    
    // Clean up extra spaces
    possibleFoodItem = possibleFoodItem.trim();
    
    console.log("Extracted specific item:", possibleFoodItem);
    
    // 4. If we have a specific food/item name AND budget, do item search with budget
    if (possibleFoodItem.length > 0 && budget && budgetType) {
    let url = `/promos/items/search?q=${encodeURIComponent(possibleFoodItem)}&budget=${budget}&type=${budgetType}`;

    if (pax) {
        url += `&pax=${pax}`;
    }

    console.log("URL (specific food with budget):", url);
    return url;
}
    
    // 5. If we have a specific food/item name but no budget
   if (possibleFoodItem.length > 0) {
    let url = `/promos/items/search?q=${encodeURIComponent(possibleFoodItem)}`;

    if (pax) {
        url += `&pax=${pax}`;
    }

    console.log("URL (specific food only):", url);
    return url;
}
    
    // 6. Budget-only queries (no specific food)
if (budget && budgetType) {
    let url = `/promos/search?q=all&budget=${budget}&type=${budgetType}`;

    if (pax) {
        url += `&pax=${pax}`;
    }

    console.log("URL (budget only):", url);
    return url;
}

// 7. Default fallback
const url = `/promos/search?q=${encodeURIComponent(text)}`;
console.log("URL (fallback):", url);
return url;
}

      function extractBudget(text) {
        const number = text.match(/\d+/);
        const value = number ? number[0] : null;

        let type = "exact";

        if (
          text.includes("below") ||
          text.includes("under") ||
          text.includes("less than")
        ) {
          type = "lte";
        }

        if (
          text.includes("above") ||
          text.includes("over") ||
          text.includes("more than")
        ) {
          type = "gte";
        }

        return { value, type };
      }

      function startVoiceRecognition() {
        if (!SpeechRecognition) {
          alert("Speech recognition is not supported in this browser.");
          return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;

        updateStatus("Listening... Speak now", true);
        setSearchText("");

        recognition.onresult = async function (event) {
          const transcript = event.results[0][0].transcript;
          setSearchText(`"${transcript}"`);
          updateStatus("", false);

          const url = processQuery(transcript);
          await fetchAndRender(url);
        };

        recognition.onerror = function (e) {
          if (e.error === "aborted" || e.error === "no-speech") {
            updateStatus("", false);
            setSearchText("Cancelled. Tap to speak again.");
          } else {
            updateStatus("", false);
            setSearchText("Voice error. Try again.");
          }
        };

        recognition.onend = function () {
          document.getElementById("micBtn").classList.remove("listening");
        };

        recognition.start();
      }

      function handleSearchSubmit() {
        const text = document.getElementById("searchInput").value.trim();
        if (!text) return;
        const url = processQuery(text);
        fetchAndRender(url);
      }

      function setPill(text) {
        setSearchText(`"${text}"`);
        const url = processQuery(text);
        fetchAndRender(url);
      }
    </script>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="/" class="navbar-brand">
        <span class="brand-logo">S'</span>
        <div class="brand-text-group">
          <span class="brand-name">Speak<em>N</em>Save</span>
          <span class="brand-sub">Voice Assistant</span>
        </div>
      </a>
      <ul class="navbar-nav">
        <li><a href="/">Home</a></li>
        <li><a href="/voice-assistant" class="active">Recommendations</a></li>
        <li><a href="/promos-page">Promos</a></li>
        <li><a href="/admin-login">Admin Login</a></li>
      </ul>
    </nav>

    <!-- RED BG WRAPPER -->
    <div class="voice-page-body">
      <div class="voice-card">
        <!-- Globe icon (language toggle placeholder) -->
        <button class="globe-btn" title="Language">🌐</button>

        <h2>What do you want to eat?</h2>

        <!-- Mic button -->
        <button
          class="mic-circle-btn"
          id="micBtn"
          onclick="startVoiceRecognition()"
          title="Tap to speak"
        >
          🎤
        </button>

        <!-- Default search bar (shown when NOT listening) -->
        <div class="search-bar-wrapper" id="searchBarWrapper">
          <div class="search-bar" id="searchBar">
            <span class="search-icon">🔍</span>
            <input
              type="text"
              id="searchInput"
              placeholder="Search here or tap the mic"
              onkeydown="if (event.key === 'Enter') handleSearchSubmit();"
            />
            <button class="send-btn" onclick="handleSearchSubmit()">➤</button>
          </div>
        </div>

        <!-- Listening / status bar (shown WHEN listening or after error) -->
        <div class="status-bar hidden" id="statusBar">
          <span class="kbd-icon">⌨️</span>
          <span id="statusText">Listening... Speak now</span>
        </div>

        <!-- Suggestion pills -->
        <div class="try-saying">
          <p class="try-saying-label">Try saying:</p>
          <div class="pills-row">
            <button class="pill-btn" onclick="setPill('Meals under P150')">
              "Meals under P150"
            </button>
            <button class="pill-btn" onclick="setPill('Chicken Promo')">
              "Chicken Promo"
            </button>
            <button class="pill-btn" onclick="setPill('Birthday Packages')">
              "Birthday Packages"
            </button>
          </div>
        </div>

        <!-- Results area -->
        <div id="results"></div>
      </div>
    </div>
  </body>
</html>
