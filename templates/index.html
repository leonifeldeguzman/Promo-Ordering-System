<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeakNSave — Voice Assistant</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <script>
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;
      let recognition = null;

      function updateStatus(text, isActive) {
        const bar = document.getElementById("statusBar");
        const barText = document.getElementById("statusText");
        const searchBar = document.getElementById("searchBarWrapper");
        const micBtn = document.getElementById("micBtn");

        barText.textContent = text;

        if (isActive) {
          bar.classList.remove("hidden");
          searchBar.classList.add("hidden");
          micBtn.classList.add("listening");
        } else {
          bar.classList.add("hidden");
          searchBar.classList.remove("hidden");
          micBtn.classList.remove("listening");
        }
      }

      function setSearchText(text) {
        document.getElementById("searchInput").value = text;
        if (text) {
          document.getElementById("searchBar").classList.add("active");
        } else {
          document.getElementById("searchBar").classList.remove("active");
        }
      }

      async function fetchAndRender(url) {
        try {
          const response = await fetch(url);
          const data = await response.json();

          const resultsDiv = document.getElementById("results");
          resultsDiv.innerHTML = "";

          let reply = "";

          if (!data || data.length === 0) {
            resultsDiv.innerHTML = `
                <div class="results-header">
                    <h2>OTHER OPTIONS</h2>
                    <div class="matches-badge">Matches : 0</div>
                </div>

                <p class="empty-text">
                    We couldn't find an exact match.
                </p>
            `;

            reply = "Sorry, no promos found.";
          } else {
            reply = `I found ${data.length} promos for you.`;

            let cardsHTML = "";

            data.forEach((promo, index) => {
              cardsHTML += `
                    <div class="carousel-card ${index === 0 ? "active" : ""}">
                        
                        <div class="promo-image">
                          ${
                            promo.image_url
                              ? `<img src="/static/${promo.image_url}" alt="${promo.name}">`
                              : ""
                          }
                            
                            <span class="promo-tag">
                                ${promo.tag || "Promo"}
                            </span>
                        </div>

                        <div class="card-content">
                            <h3>${promo.name}</h3>

                            <p>
                                ${promo.description}
                            </p>

                            <div class="price-row">
                            <span class="old-price">
                                ₱${Math.round(Number(promo.price) + 40)}
                            </span>

                            <span class="new-price">
                                ₱${Math.round(Number(promo.price))}
                            </span>
                        </div>
                        </div>

                    </div>
                `;
            });

            resultsDiv.innerHTML = `
                <div class="results-wrapper">

                    <div class="results-header">
                        <h2>DEALS OFFERED</h2>

                        <div class="matches-badge">
                            Matches : ${data.length}
                        </div>
                    </div>

                    <div class="carousel-container">

                        <button class="carousel-btn left">
                            &#10094;
                        </button>

                        <div class="carousel-track">
                            ${cardsHTML}
                        </div>

                        <button class="carousel-btn right">
                            &#10095;
                        </button>

                    </div>

                    <div class="results-footer">

                        <button class="retry-btn">
                            Try Again
                        </button>

                        <button class="view-btn">
                            View All Promos
                        </button>

                    </div>

                </div>
            `;
            initializeCarousel();
          }

          const speech = new SpeechSynthesisUtterance(reply);
          speech.lang = "en-US";

          window.speechSynthesis.speak(speech);
        } catch (err) {
          console.error(err);
        }
      }
      function initializeCarousel() {
        const track = document.querySelector(".carousel-track");

        const leftBtn = document.querySelector(".carousel-btn.left");

        const rightBtn = document.querySelector(".carousel-btn.right");

        if (!track || !leftBtn || !rightBtn) return;

        const scrollAmount = 320;

        rightBtn.addEventListener("click", () => {
          track.scrollBy({
            left: scrollAmount,
            behavior: "smooth",
          });
        });

        leftBtn.addEventListener("click", () => {
          track.scrollBy({
            left: -scrollAmount,
            behavior: "smooth",
          });
        });
      }
function processQuery(transcript) {
    let text = transcript.toLowerCase().trim();
    console.log("Processing:", text);

    // ==========================================
    // INNER UTILITY: Dynamic Text-to-Number Parser
    // ==========================================
    const textToNumber = (inputStr) => {
        const words = {
            'zero':0, 'one':1, 'two':2, 'three':3, 'four':4, 'five':5, 'six':6, 'seven':7, 'eight':8, 'nine':9, 'ten':10,
            'eleven':11, 'twelve':12, 'thirteen':13, 'fourteen':14, 'fifteen':15, 'sixteen':16, 'seventeen':17, 'eighteen':18, 'nineteen':19,
            'twenty':20, 'thirty':30, 'forty':40, 'fifty':50, 'sixty':60, 'seventy':70, 'eighty':80, 'ninety':90
        };
        const scales = { 'hundred':100, 'thousand':1000, 'million':1000000, 'billion':1000000000 };

        const tokens = inputStr.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/);
        let currentResult = 0;
        let finalResult = 0;
        let hasNumber = false;

        for (let word of tokens) {
            if (words[word] !== undefined) {
                currentResult += words[word];
                hasNumber = true;
            } else if (scales[word] !== undefined) {
                currentResult *= scales[word];
                if (word !== 'hundred') {
                    finalResult += currentResult;
                    currentResult = 0;
                }
                hasNumber = true;
            } else if (!isNaN(word) && word !== "") {
                currentResult += parseInt(word);
                hasNumber = true;
            }
        }
        finalResult += currentResult;
        return hasNumber ? finalResult : null;
    };

    // ==========================================
    // DYNAMIC PARSING LOGIC
    // ==========================================

    // 1 & 2. Extract pax count using phrase-context rules
    let pax = null;
    const paxMatch = text.match(/(?:for|feed|good for|pax|people|persons?)\s+([a-z0-9\s]+?)(?:$|\s+(?:under|below|above|over|pesos|php|p\d))/i);
    
    if (paxMatch) {
        const parsedPax = textToNumber(paxMatch[1]);
        if (parsedPax !== null) {
            pax = parsedPax;
            text = text.replace(paxMatch[0], ""); // Strip out the text so it won't break budget reading
        }
    }

    console.log("Pax:", pax);
    
    // 3. Extract budget from remaining text dynamically
    let budget = null;
    const budgetMatch = text.match(/(?:under|below|less than|above|over|more than|budget of)?\s*([a-z0-9\s]+?)(?:\s*(?:pesos|php|p)\b|$)/i);
    if (budgetMatch) {
        const parsedBudget = textToNumber(budgetMatch[1]);
        if (parsedBudget !== null) budget = parsedBudget;
    }
    
    // Determine budget type
    let budgetType = null;
    if (transcript.includes("under") || transcript.includes("below") || transcript.includes("less than")) {
        budgetType = "under";
    } else if (transcript.includes("above") || transcript.includes("over") || transcript.includes("more than")) {
        budgetType = "above";
    }
    
    // Check for "all promos" intent
    const isAllPromos = 
        transcript.includes("all") ||
        transcript.includes("everything") ||
        transcript.includes("menu");
    
    // Clean up specific food item keywords
    let possibleFoodItem = text;
    possibleFoodItem = possibleFoodItem.replace(/under|below|less than|above|over|more than|pesos|p|php/gi, "");
    if (budget) possibleFoodItem = possibleFoodItem.replace(budget.toString(), "");
    possibleFoodItem = possibleFoodItem.replace(/meals|food|items|promos|deals|offers|good|for|people|pax|person|meal|item/gi, "");
    possibleFoodItem = possibleFoodItem.replace(/i\s+want|i\s+need|can\s+i\s+have|please|get\s+me|show\s+me|suggest|find|look\s+for|search\s+for|give\s+me/gi, "");
    possibleFoodItem = possibleFoodItem.trim();
    
    console.log("Extracted specific item:", possibleFoodItem);
    
    // 4. Construct API URL
    let baseUrl = "/promos/search";
    if (possibleFoodItem.length > 0 && !isAllPromos) {
        baseUrl = "/promos/items/search";
    }

    let params = [];
    if (possibleFoodItem.length > 0 && !isAllPromos) {
        params.push(`q=${encodeURIComponent(possibleFoodItem)}`);
    } else {
        params.push("q=all");
    }

    if (budget) params.push(`budget=${budget}`);
    if (budgetType) params.push(`type=${budgetType}`);
    if (pax) params.push(`pax=${pax}`);

    const finalUrl = `${baseUrl}?${params.join("&")}`;
    console.log("Generated URL:", finalUrl);
    return finalUrl;
}
     

      function extractBudget(text) {
        const number = text.match(/\d+/);
        const value = number ? number[0] : null;

        let type = "exact";

        if (
          text.includes("below") ||
          text.includes("under") ||
          text.includes("less than")
        ) {
          type = "lte";
        }

        if (
          text.includes("above") ||
          text.includes("over") ||
          text.includes("more than")
        ) {
          type = "gte";
        }

        return { value, type };
      }

      function startVoiceRecognition() {
        if (!SpeechRecognition) {
          alert("Speech recognition is not supported in this browser.");
          return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = "en-US";
        recognition.interimResults = false;

        updateStatus("Listening... Speak now", true);
        setSearchText("");

        recognition.onresult = async function (event) {
          const transcript = event.results[0][0].transcript;
          setSearchText(`"${transcript}"`);
          updateStatus("", false);

          const url = processQuery(transcript);
          await fetchAndRender(url);
        };

        recognition.onerror = function (e) {
          if (e.error === "aborted" || e.error === "no-speech") {
            updateStatus("", false);
            setSearchText("Cancelled. Tap to speak again.");
          } else {
            updateStatus("", false);
            setSearchText("Voice error. Try again.");
          }
        };

        recognition.onend = function () {
          document.getElementById("micBtn").classList.remove("listening");
        };

        recognition.start();
      }

      function handleSearchSubmit() {
        const text = document.getElementById("searchInput").value.trim();
        if (!text) return;
        const url = processQuery(text);
        fetchAndRender(url);
      }

      function setPill(text) {
        setSearchText(`"${text}"`);
        const url = processQuery(text);
        fetchAndRender(url);
      }
    </script>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="/" class="navbar-brand">
        <span class="brand-logo">S'</span>
        <div class="brand-text-group">
          <span class="brand-name">Speak<em>N</em>Save</span>
          <span class="brand-sub">Voice Assistant</span>
        </div>
      </a>
      <ul class="navbar-nav">
        <li><a href="/">Home</a></li>
        <li><a href="/voice-assistant" class="active">Recommendations</a></li>
        <li><a href="/promos-page">Promos</a></li>
        <li><a href="/admin-login">Admin Login</a></li>
      </ul>
    </nav>

    <!-- RED BG WRAPPER -->
    <div class="voice-page-body">
      <div class="voice-card">
        <!-- Globe icon (language toggle placeholder) -->
        <button class="globe-btn" title="Language">🌐</button>

        <h2>What do you want to eat?</h2>

        <!-- Mic button -->
        <button
          class="mic-circle-btn"
          id="micBtn"
          onclick="startVoiceRecognition()"
          title="Tap to speak"
        >
          🎤
        </button>

        <!-- Default search bar (shown when NOT listening) -->
        <div class="search-bar-wrapper" id="searchBarWrapper">
          <div class="search-bar" id="searchBar">
            <span class="search-icon">🔍</span>
            <input
              type="text"
              id="searchInput"
              placeholder="Search here or tap the mic"
              onkeydown="if (event.key === 'Enter') handleSearchSubmit();"
            />
            <button class="send-btn" onclick="handleSearchSubmit()">➤</button>
          </div>
        </div>

        <!-- Listening / status bar (shown WHEN listening or after error) -->
        <div class="status-bar hidden" id="statusBar">
          <span class="kbd-icon">⌨️</span>
          <span id="statusText">Listening... Speak now</span>
        </div>

        <!-- Suggestion pills -->
        <div class="try-saying">
          <p class="try-saying-label">Try saying:</p>
          <div class="pills-row">
            <button class="pill-btn" onclick="setPill('Meals under P150')">
              "Meals under P150"
            </button>
            <button class="pill-btn" onclick="setPill('Chicken Promo')">
              "Chicken Promo"
            </button>
            <button class="pill-btn" onclick="setPill('Birthday Packages')">
              "Birthday Packages"
            </button>
          </div>
        </div>

        <!-- Results area -->
        <div id="results"></div>
      </div>
    </div>
  </body>
</html>
