<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

let recognition;

function startAdminVoice(){

    recognition =
    new SpeechRecognition();

    recognition.lang='en-US';

    recognition.start();

    recognition.onresult=function(event){

        const text=
        event.results[0][0]
        .transcript
        .toLowerCase();

        console.log(text);

        processVoice(text);

    };

}

function processVoice(text){

    /* upload image command */

    if(text.includes("upload image")){

        speak("Choose image file");

        document
        .getElementById("image")
        .click();

        return;
    }

    /* extract values */

    const price =
    text.match(/price\s+(\d+)/);

    const category =
    text.match(/category\s+(.+?)(?=promo|status|$)/);

    const promo =
    text.match(/promo\s+(.+?)(?=status|$)/);

    const status =
    text.match(
    /status\s+(active|sold out|phased out)/
    );

  let item='';

if(text.includes("add")){

    /* ACTION ONLY: don't modify item name */
    if(text.includes("to menu")){

        speak("Adding item to menu");

        document
        .getElementById("adminForm")
        .submit();

        return;
    }

    /* Only set item name when NOT a menu action */
    item = text
        .replace(/^add\s+/i,"")
        .replace(/price.+/i,"")
        .replace(/category.+/i,"")
        .replace(/promo.+/i,"")
        .replace(/status.+/i,"")
        .replace(/\s+/g," ")
        .trim();

    if(item !== ''){

        document
        .getElementById("item_name")
        .value=item;
    }
}

    if(price){

        document
        .getElementById("price")
        .value=price[1];

    }

    if(category){

        document
        .getElementById("category")
        .value=
        category[1].trim();

    }

    if(promo){

        document
        .getElementById("promo_details")
        .value=
        promo[1].trim();

    }

    if(status){

        document
        .getElementById("status")
        .value=
        capitalize(status[1]);

    }

    /* wait if image missing */

    const imageInput =
    document.getElementById("image");

    if(imageInput.files.length===0){

        speak(
        "Say upload image if you want to add a picture"
        );

        return;
    }

    /* auto add */

    speak(
    "Adding item to menu"
    );

    document
    .getElementById("adminForm")
    .submit();

}

function capitalize(str){

    return str.replace(
    /\b\w/g,
    c=>c.toUpperCase()
    );

}

function speak(message){

    let speech=
    new SpeechSynthesisUtterance(
    message
    );

    speech.lang='en-US';

    speechSynthesis.speak(
    speech
    );

}

/* submit automatically once image chosen */

document
.getElementById("image")
.addEventListener(
"change",
function(){

document
.getElementById("adminForm")
.submit();

});

</script>
</head>
<body>
<a href="/logout">
    Logout
</a>
    <h1>Admin Panel</h1>

    <h2>Add Menu Item</h2>

   <form id="adminForm"
      action="/add-item"
      method="POST"
      enctype="multipart/form-data">

    <input id="item_name"
           type="text"
           name="item_name"
           placeholder="Item Name"
           required>

    <input id="price"
           type="number"
           step="0.01"
           name="price"
           placeholder="Price"
           required>

    <input id="category"
           type="text"
           name="category"
           placeholder="Category">

    <input id="promo_details"
           type="text"
           name="promo_details"
           placeholder="Promo Details">

    <input id="image"
           type="file"
           name="image">

    <select id="status" name="status">
        <option value="Active">Active</option>
        <option value="Phased Out">Phased Out</option>
        <option value="Sold Out">Sold Out</option>
    </select>

</form>

<button onclick="startAdminVoice()">
    🎤 Voice Add
</button>

    <hr>

    <h2>Menu Items</h2>

    {% for item in items %}

        <div style="border:1px solid black; padding:10px; margin:10px;">

            <p><strong>{{ item[1] }}</strong></p>         
            <p>Category: {{ item[2] }}</p>                  
            <p>Price: ₱{{ item[3] }}</p>                   
            <p>Description: {{ item[4] }}</p>               
            <p>Promo: {{ item[5] }}</p>                     
            <p>Status: {{ item[6] }}</p>                   

            <!-- UPDATE PRICE -->
            <form action="/update-price/{{ item[0] }}" method="POST">
                <input type="number" step="0.01" name="price" placeholder="New Price">
                <button type="submit">Update Price</button>
            </form>

            <!-- UPDATE STATUS -->
            <form action="/update-status/{{ item[0] }}" method="POST">
                <select name="status">
                    <option value="Active">Active</option>
                    <option value="Phased Out">Phased Out</option>
                    <option value="Sold Out">Sold Out</option>
                </select>
                <button type="submit">Update Status</button>
            </form>

            <!-- DELETE ITEM -->
            <form action="/delete-item/{{ item[0] }}" method="POST">
                <button type="submit" style="background:red; color:white;">
                    Delete
                </button>
            </form>

          

            </form>

        </div>

    {% endfor %}

</body>
</html>
