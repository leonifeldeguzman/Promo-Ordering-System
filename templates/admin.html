<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<a href="/logout">
    Logout
</a>
    <h1>Admin Panel</h1>

    <h2>Add Menu Item</h2>

    <form action="/add-item" method="POST"  enctype="multipart/form-data">

        <input type="text" name="item_name" placeholder="Item Name" required>

        <input type="number" step="0.01" name="price" placeholder="Price" required>

        <input type="text" name="category" placeholder="Category">

        <input type="text" name="promo_details" placeholder="Promo Details">
        <input type="file"
       name="image">

        <select name="status">
            <option value="Active">Active</option>
            <option value="Phased Out">Phased Out</option>
            <option value="Sold Out">Sold Out</option>
        </select>

        <button type="submit">Add Item</button>

    </form>

    <hr>

    <h2>Menu Items</h2>

    {% for item in items %}

        <div style="border:1px solid black; padding:10px; margin:10px;">

            <p><strong>{{ item[1] }}</strong></p>         
            <p>Category: {{ item[2] }}</p>                  
            <p>Price: ₱{{ item[3] }}</p>                   
            <p>Description: {{ item[4] }}</p>               
            <p>Promo: {{ item[5] }}</p>                     
            <p>Status: {{ item[6] }}</p>                   

            <!-- UPDATE PRICE -->
            <form action="/update-price/{{ item[0] }}" method="POST">
                <input type="number" step="0.01" name="price" placeholder="New Price">
                <button type="submit">Update Price</button>
            </form>

            <!-- UPDATE STATUS -->
            <form action="/update-status/{{ item[0] }}" method="POST">
                <select name="status">
                    <option value="Active">Active</option>
                    <option value="Phased Out">Phased Out</option>
                    <option value="Sold Out">Sold Out</option>
                </select>
                <button type="submit">Update Status</button>
            </form>

            <!-- DELETE ITEM -->
            <form action="/delete-item/{{ item[0] }}" method="POST">
                <button type="submit" style="background:red; color:white;">
                    Delete
                </button>
            </form>

          

            </form>

        </div>

    {% endfor %}

</body>
</html>
